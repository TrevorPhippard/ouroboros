services:
  frontend:
    container_name: frontend
    image: node:20-alpine
    working_dir: /app
    ports:
      - "8080:8080"
    volumes:
      - ../app/web:/app
      - /app/node_modules
    command: sh -c "yarn install && yarn dev --host 0.0.0.0"
    environment:
      - NODE_ENV=development
    networks:
      - orion-net


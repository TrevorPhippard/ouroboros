syntax = "proto3";

package post;

option go_package = "ouroboros/proto/post";

// import "common/common.proto";

service PostService {
  rpc CreatePost (CreatePostRequest) returns (Post);

  rpc GetPost (GetPostRequest) returns (Post);
  rpc GetPostsByIds (GetPostsByIdsRequest) returns (GetPostsByIdsResponse);

  rpc GetCommentsByPostId (GetCommentsRequest) returns (GetCommentsResponse);
}

message CreatePostRequest {
  string author_id = 1;
  string content = 2;
}

message GetPostRequest {
  string id = 1;
}

message GetPostsByIdsRequest {
  repeated string ids = 1;
}

message GetPostsByIdsResponse {
  repeated Post posts = 1;
}

message GetCommentsRequest {
  string post_id = 1;
  // common.Pagination pagination = 2;
}

message GetCommentsResponse {
  repeated Comment comments = 1;
  // common.PageInfo page_info = 2;
}

message Post {
  string id = 1;
  string author_id = 2;
  string content = 3;
  string created_at = 4;
}

message Comment {
  string id = 1;
  string post_id = 2;
  string author_id = 3;
  string content = 4;
  string created_at = 5;
}
syntax = "proto3";

package feed;
option go_package = "ouroboros/proto/feed";

// import "ouroboros/proto/common/common.proto";

service FeedService {
  rpc GetFeed (GetFeedRequest) returns (GetFeedResponse);
}

message GetFeedRequest {
  string user_id = 1;
  int32 limit = 3;
  string cursor = 4;
}

message Post {
  string id = 1;
  string author_id = 2;
  string content = 3;
  string timestamp = 4; // ISO8601 format
}

message FeedItem {
  string post_id = 1;
  string cursor = 2;
  Post post = 3;
}

message GetFeedResponse {
  repeated FeedItem items = 1;
  // common.PageInfo page_info = 2;
}